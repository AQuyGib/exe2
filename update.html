<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Màn hình cập nhật</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
        }
        .nav-box, .footer-box {
            border: 1px solid #000;
            padding: 10px;
            text-align: center;
            margin-bottom: 30px;
        }
        .nav-box a {
            text-decoration: none;
            color: #000;
            margin: 0 5px;
        }
        .main-box {
            border: 1px solid #000;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            margin: 40px auto;
            box-sizing: border-box;
        }
        .main-box h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 30px;
            font-weight: normal;
        }
        .form-row {
            display: flex;
            margin-bottom: 15px;
            align-items: center;
        }
        .form-row .label {
            width: 100px;
            text-align: center;
            padding-right: 15px;
            font-size: 14px;
            line-height: 1.2;
        }
        .form-row .field {
            flex: 1;
            display: flex;
        }
        .form-row .field input[type="text"],
        .form-row .field input[type="password"],
        .form-row .field input[type="email"] {
            width: 100%;
            padding: 6px;
            border: 1px solid #000;
            outline: none;
            text-align: center; /* Để chữ xxxx vào giữa theo mockup */
        }
        .form-row .field.actions {
            justify-content: center; /* Nút Cập nhật để ở giữa phải hoặc phải */
            justify-content: flex-end;
            align-items: center;
            margin-top: 15px;
        }
        .btn {
            background-color: #0d6efd;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn:hover {
            background-color: #0b5ed7;
        }
        .footer-box {
            margin-top: 40px;
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header Navigation -->
        <div class="nav-box">
            <a href="#">Home</a> | <a href="login.html">Đăng nhập</a> | <a href="register.html">Đăng ký</a>
        </div>

        <!-- Main Content -->
        <div class="main-box">
            <h2>Màn hình cập nhật</h2>
            <form action="list.html" method="GET">
                <div class="form-row">
                    <div class="label">Username</div>
                    <div class="field">
                        <input type="text" name="username" value="xxxx" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="label">Mật khẩu</div>
                    <div class="field">
                        <input type="password" name="password" value="xxxx" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="label">Nhập lại<br>mật khẩu</div>
                    <div class="field">
                        <input type="password" name="repassword" value="xxxx" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="label">Email</div>
                    <div class="field">
                        <input type="email" name="email" value="xxxx" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="label"></div>
                    <div class="field actions">
                        <!-- Trong hình demo nút là "Đăng ký" nhưng logic đúng là "Cập nhật" -->
                        <button type="submit" class="btn">Cập nhật</button>
                    </div>
                </div>
            </form>
        </div>

        <!-- Footer -->
        <div class="footer-box">
            Lập trình web @01/2024
        </div>
    </div>
</body>
</html>
